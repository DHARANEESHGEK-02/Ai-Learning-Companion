version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${PGPASSWORD:-postgres}@db:5432/ai_learning
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-change_me}
    volumes:
      - ./uploads:/workspace/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    command: streamlit run app/app.py --server.port 5000 --server.address 0.0.0.0
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:${PGPASSWORD:-postgres}@db:5432/ai_learning
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - backend

volumes:
  pgdata:
